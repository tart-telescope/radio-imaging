#!/usr/bin/env -S stimela run -l
# This basic TART Stimela 2.0 processing pipeline
opts:
    log:
        dir: logs/log-{config.run.datetime}
        name: log-{info.fqname}
        nest: 2
        symlink: log

_include:
    - (tartcargo):
        - tart2ms.yml
        - tart-download-data.yml
        - disko.yml
        - spotless.yml
        - disko-draw.yml
    - (cultcargo):
        - wsclean.yml

tart-image:
    info: TART imaging using stimela

    inputs:
        tart:
            dtype: str
            required: true
            info: "TART name (e.g. mu-udm)"

    outputs:
        ms:
            dtype: MS
            default:  '{current.tart}.ms'
        hdf:
            dtype: File
            default: '{current.tart}-vis.hdf'
        svg:
            dtype: File
            default: '{current.tart}.svg'
        imgdir:
          dtype: Directory
          mkdir: true
          default: img

    assign:
        api: 'https://api.elec.ac.nz/tart/{recipe.tart}'

    steps:
        download-hdf:
            cab: tart-download-data
            skip: =EXISTS(recipe.hdf)
            params:
                api: =recipe.api
                vis: true
                file: =recipe.hdf

        create-ms:
            cab: tart2ms
            skip: =EXISTS(recipe.ms)
            params:
                hdf: =steps.download-hdf.file
                ms: =recipe.ms
                clobber: true
                single-field: true
                rephase: obs-midpoint

        wsclean-image:
            cab: wsclean
            params:
                ms: =recipe.ms
                prefix: '{recipe.imgdir}/{recipe.tart}'
                temp-dir: '.'
                size: 1024
                scale: 7.0amin
                column: DATA
                nchan: 1
                pol: RR
                weight: briggs 0.0
                intervals-out: 1
                gain: 0.1
                mgain: 0.85
                niter: 5000
                auto-mask: 1.5
                auto-threshold: 1
                no-update-model-required: true
                no-fast-subminor: true
                no-min-grid-resolution: true


        spotless-image:
            cab: spotless
            params:
                ms: =recipe.ms
                HDF: ='{recipe.tart}-spotless.sphere'
                nvis: 10000
                multimodel: false
                healpix: true
                fov: 170deg
                res: 0.5deg

        spotless-draw:
            cab: disko-draw
            params:
                hdf: ='{recipe.tart}-spotless.sphere'
                show-sources: true
                scale-mad: true
                SVG: ='spotless-{recipe.svg}'

        multimodel-image:
            cab: spotless
            params:
                ms: =recipe.ms
                HDF: ='{recipe.tart}-multimodel.sphere'
                nvis: 10000
                multimodel: true
                healpix: true
                fov: 170deg
                res: 0.5deg

        multimodel-draw:
            cab: disko-draw
            params:
                hdf: ='{recipe.tart}-multimodel.sphere'
                show-sources: true
                scale-mad: true
                SVG: ='multimodel-{recipe.svg}'


